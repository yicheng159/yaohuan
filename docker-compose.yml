version: '3.8'

services:
  db:
    image: postgres:13
    container_name: yaohuan-db
    environment:
      POSTGRES_DB: yaohuan
      POSTGRES_USER: yaohuan
      POSTGRES_PASSWORD: yaohuan123
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yaohuan"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yaohuan-network

  backend:
    build: .
    container_name: yaohuan-backend
    env_file:
      - .env
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-ca1t*p((5#hcgyq#07h3%rr6vl)_x_1+mij3#e@_6705tl(5bg)
      - DATABASE_URL=postgres://yaohuan:yaohuan123@db:5432/yaohuan
      - ALLOWED_HOSTS=*
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --threads 2 myproject.wsgi:application"
    networks:
      - yaohuan-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yaohuan-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - yaohuan-network

networks:
  yaohuan-network:
    driver: bridge

volumes:
  postgres_data:
  static_volume: