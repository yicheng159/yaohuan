version: '3.8'

services:
  db:
    image: postgres:13
    container_name: yaohuan-db
    environment:
      POSTGRES_DB: yaohuan
      POSTGRES_USER: yaohuan
      POSTGRES_PASSWORD: yaohuan123
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yaohuan"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: yaohuan-backend
    environment:
      - DEBUG=False
      - SECRET_KEY=your-secret-key-change-in-production
      - DATABASE_URL=postgres://yaohuan:yaohuan123@db:5432/yaohuan
      - ALLOWED_HOSTS=localhost,your-domain.com
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && gunicorn --bind 0.0.0.0:8000 myproject.wsgi:application"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yaohuan-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: