services:
  # PostgreSQL Database
  - type: pserv
    name: yaohuan-db
    env: python
    plan: free
    region: oregon
    branch: master
    numNodes: 1
    dbname: yaohuan
    databaseName: yaohuan
    databaseUser: yaohuan
    ipAllowRules:
      - source: 0.0.0.0/0
        description: Allow all connections

  # Django Web Service
  - type: web
    name: yaohuan-backend
    env: python
    plan: free
    region: oregon
    branch: master
    buildCommand: "./build.sh"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 2 myproject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.8.18
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: yaohuan-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://yicheng159.github.io/yaohuan,http://localhost:5173
      - key: CSRF_TRUSTED_ORIGINS
        value: https://yicheng159.github.io/yaohuan,http://localhost:5173
      - key: WEB_CONCURRENCY
        value: 2
      - key: DJANGO_SETTINGS_MODULE
        value: myproject.settings